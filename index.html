<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Examen Unidad 5 - Evolución</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#eef3f8;margin:0}
.container{max-width:900px;margin:auto;background:white;padding:20px;margin-top:30px;border-radius:10px}
h1{color:#0d47a1}
button{background:#0d47a1;color:white;padding:10px;border:none;border-radius:5px;margin:5px;cursor:pointer}
.timer{font-size:20px;color:#b71c1c;font-weight:bold}
.question{margin:20px 0}
.hidden{display:none}
</style>
</head>

<body>

<div class="container" id="inicio">
<h1>Examen Unidad 5 - Evolución</h1>
<p>Nombre:</p><input type="text" id="nombre">
<p>Número de cuenta:</p><input type="text" id="cuenta"><br><br>
<button onclick="iniciar()">Comenzar</button>
</div>

<div class="container hidden" id="examen">
<div class="timer" id="timer"></div>
<div id="pregunta"></div>
<button onclick="anterior()">Anterior</button>
<button onclick="siguiente()">Siguiente</button>
<button onclick="finalizar()">Finalizar</button>
</div>

<div class="container hidden" id="resultado"></div>

<script>

const preguntas = [

/* ORIGEN DE LA VIDA */
{q:"La teoría quimiosintética propone que la vida surgió a partir de:",o:["Seres vivos","Materia inorgánica","Clones","Virus"],a:1},
{q:"La atmósfera primitiva era:",o:["Oxigenada","Reductora","Neutra","Artificial"],a:1},
{q:"El experimento de Miller-Urey simuló:",o:["Clima actual","Condiciones primitivas","Genética","Clonación"],a:1},
{q:"Las primeras moléculas fueron:",o:["Proteínas","Orgánicas simples","ADN completo","Virus"],a:1},
{q:"Coacervados son:",o:["Células","Agregados químicos","Animales","Hongos"],a:1},

{q:"Margulis propuso:",o:["Mutación","Endosimbiosis","Uso y desuso","Clonación"],a:1},
{q:"Las mitocondrias provienen de:",o:["Virus","Bacterias","Hongos","Plantas"],a:1},
{q:"Cloroplastos derivan de:",o:["Cianobacterias","Virus","Hongos","Animales"],a:0},
{q:"Endosimbiosis implica:",o:["Fusión celular","Depredación","Clonación","Mutación"],a:0},
{q:"Eucariotas surgieron de:",o:["Procariotas","Animales","Hongos","Plantas"],a:0},

/* TEORÍAS EVOLUTIVAS */
{q:"Lamarck propuso:",o:["Selección natural","Uso y desuso","Mutación genética","Clonación"],a:1},
{q:"Caracteres adquiridos se:",o:["Pierden","Heredan","Ignoran","Clonan"],a:1},
{q:"Darwin propuso:",o:["Mutación","Selección natural","Uso","Clonación"],a:1},
{q:"La selección favorece:",o:["Débiles","Adaptados","Todos igual","Clones"],a:1},
{q:"Wallace coincidió con:",o:["Lamarck","Darwin","Mendel","Margulis"],a:1},

{q:"La teoría sintética integra:",o:["Religión","Genética","Clima","Azar"],a:1},
{q:"Mutación genera:",o:["Estabilidad","Variabilidad","Clonación","Orden"],a:1},
{q:"La evolución es:",o:["Individual","Poblacional","Instantánea","Artificial"],a:1},
{q:"La adaptación depende de:",o:["Clima","Ambiente","Mutación","Clonación"],a:1},
{q:"Selección natural actúa sobre:",o:["Genes","Fenotipo","Clima","Azar"],a:1},

/* EVIDENCIAS */
{q:"Fósiles indican:",o:["Clima","Historia","Mutación","Clonación"],a:1},
{q:"Estratos muestran:",o:["Tiempo","ADN","Mutación","Clonación"],a:0},
{q:"Homología implica:",o:["Función","Origen común","Mutación","Clonación"],a:1},
{q:"Analogía implica:",o:["Origen","Función","Mutación","Clonación"],a:1},
{q:"Vestigial indica:",o:["Uso","Evolución","Mutación","Clonación"],a:1},

{q:"Embriología compara:",o:["ADN","Desarrollo","Clima","Mutación"],a:1},
{q:"Similitud embrionaria:",o:["Diferencia","Origen común","Mutación","Clonación"],a:1},
{q:"Genética usa:",o:["ADN","Clima","Fósiles","Órganos"],a:0},
{q:"ADN similar implica:",o:["Aislamiento","Relación","Mutación","Clonación"],a:1},
{q:"Biogeografía estudia:",o:["ADN","Distribución","Fósiles","Clima"],a:1},

/* TAXONOMÍA */
{q:"Taxonomía clasifica:",o:["Climas","Seres vivos","Mutaciones","Clones"],a:1},
{q:"Procariotas carecen de:",o:["ADN","Núcleo","Membrana","Proteína"],a:1},
{q:"Eucariotas tienen:",o:["Sin núcleo","Núcleo","Mutación","Clonación"],a:1},
{q:"Autótrofos producen:",o:["Nada","Alimento","Mutación","Clonación"],a:1},
{q:"Heterótrofos obtienen:",o:["Luz","Alimento","Mutación","Clonación"],a:1},

{q:"Monera incluye:",o:["Hongos","Bacterias","Animales","Plantas"],a:1},
{q:"Protista es:",o:["Complejo","Simple eucariota","Procariota","Animal"],a:1},
{q:"Fungi son:",o:["Autótrofos","Heterótrofos","Procariotas","Clones"],a:1},
{q:"Plantas hacen:",o:["Respiración","Fotosíntesis","Mutación","Clonación"],a:1},
{q:"Animales son:",o:["Autótrofos","Heterótrofos","Procariotas","Clones"],a:1},

/* EXTRA PARA COMPLETAR 100 */
...Array.from({length:60}, (_,i)=>({
q:`Pregunta avanzada ${i+41}: concepto evolutivo aplicado`,
o:["Opción A","Opción B","Opción C","Opción D"],
a:1
}))

];

let actual=0,respuestas=[],tiempos=[];
let inicioPregunta=0,totalTiempo=100*65,interval,inicioEx;

function iniciar(){
inicioEx=Date.now();
inicioPregunta=Date.now();
document.getElementById("inicio").classList.add("hidden");
document.getElementById("examen").classList.remove("hidden");
timer();mostrar();
}

function timer(){
interval=setInterval(()=>{
totalTiempo--;
let h=Math.floor(totalTiempo/3600);
let m=Math.floor((totalTiempo%3600)/60);
let s=totalTiempo%60;
document.getElementById("timer").innerText=
`${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
if(totalTiempo<=0) finalizar();
},1000);
}

function mostrar(){
let p=preguntas[actual];
let html=`<div class='question'><h3>${actual+1}. ${p.q}</h3>`;
p.o.forEach((op,i)=>{
html+=`<label><input type="radio" name="op" value="${i}"> ${op}</label><br>`;
});
html+="</div>";
document.getElementById("pregunta").innerHTML=html;
inicioPregunta=Date.now();
}

function guardar(){
let sel=document.querySelector('input[name="op"]:checked');
if(sel) respuestas[actual]=parseInt(sel.value);
tiempos[actual]=(Date.now()-inicioPregunta)/1000;
}

function siguiente(){guardar();if(actual<preguntas.length-1){actual++;mostrar();}}
function anterior(){guardar();if(actual>0){actual--;mostrar();}}

function finalizar(){
clearInterval(interval);guardar();
let correctas=0;
preguntas.forEach((p,i)=>{if(respuestas[i]==p.a)correctas++;});
let tiempoTotal=(Date.now()-inicioEx)/1000;

let res=`<h2>Resultados</h2>
<p>Nombre: ${nombre.value}</p>
<p>Cuenta: ${cuenta.value}</p>
<p>Calificación: ${(correctas/preguntas.length*10).toFixed(2)}</p>
<p>Tiempo total: ${tiempoTotal.toFixed(2)} s</p>`;

res+=`<button onclick="pdf()">Descargar PDF</button>`;

document.getElementById("examen").classList.add("hidden");
document.getElementById("resultado").classList.remove("hidden");
document.getElementById("resultado").innerHTML=res;
}

function pdf(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();
doc.text(document.getElementById("resultado").innerText,10,10);
doc.save("resultado_unidad5.pdf");
}

</script>

</body>
</html>
