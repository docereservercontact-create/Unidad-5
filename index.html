<html lang="es">
<head>
<meta charset="UTF-8">

<style>
body { font-family: Arial; background:#121212; color:white; text-align:center; }

</style>
</head>

<body>

<input type="text" id="cuenta" placeholder="Número de cuenta"><br><br>
<button onclick="iniciar()">Iniciar examen</button>
</div>

<script>
const preguntas = [
{q:"La teoría quimiosintética propone:", o:["Organismos complejos","Evolución química","ADN previo","Seres vivos"], a:1},
{q:"Atmósfera primitiva:", o:["Oxígeno","Reductora","Actual","Neutra"], a:1},

{q:"Mitocondria tiene:", o:["Nada","ADN","Clorofila","Membrana simple"], a:1},
{q:"Evolución química:", o:["Especies","Moléculas","Clima","Células"], a:1},
{q:"Síntesis abiótica:", o:["Vida previa","Sin vida","Mutación","Clonación"], a:1},

{q:"Lamarck:", o:["Selección","Uso y desuso","ADN","Clonación"], a:1},
{q:"Ejemplo Lamarck:", o:["Selección","Cuello jirafa","Mutación","Deriva"], a:1},
{q:"Error Lamarck:", o:["Ambiente","Herencia adquirida","Fósiles","Genes"], a:1},
{q:"Darwin:", o:["Uso","Selección natural","Mutación","Clonación"], a:1},
{q:"Selección actúa en:", o:["ADN","Fenotipo","Genes","Proteínas"], a:1},
{q:"Sobrevive:", o:["Grande","Adaptado","Rápido","Fuerte"], a:1},
{q:"Variabilidad:", o:["Reduce","Permite adaptación","Elimina","Clona"], a:1},
{q:"Teoría sintética:", o:["Lamarck","Darwin+genética","Clima","Fósiles"], a:1},
{q:"Mutación:", o:["Cambio ADN","Ambiente","Clima","Selección"], a:0},
{q:"Deriva genética:", o:["Selección","Azar","Uso","Adaptación"], a:1},

{q:"Flujo génico:", o:["Mutación","Migración genes","Clima","Clonación"], a:1},
{q:"Especiación:", o:["Adaptación","Nueva especie","Mutación","Reproducción"], a:1},
{q:"Aislamiento:", o:["Igualdad","Diferenciación","Clonación","Mutación"], a:1},
{q:"Selección direccional:", o:["Promedio","Extremos","Igual","Estable"], a:1},
{q:"Evolución ocurre en:", o:["Individuo","Población","Órgano","Célula"], a:1},

{q:"Fósiles:", o:["ADN","Historia","Futuro","Mutación"], a:1},
{q:"Fosilización:", o:["Destruye","Conserva","Mutación","Clona"], a:1},
{q:"Fósil transición:", o:["Extinción","Cambio","Mutación","Clonación"], a:1},
{q:"Anatomía comparada:", o:["ADN","Estructuras","Clima","Mutación"], a:1},
{q:"Homólogos:", o:["Función","Origen","Mutación","Clonación"], a:1},

{q:"Análogos:", o:["Origen","Función","ADN","Mutación"], a:1},
{q:"Convergencia:", o:["Diferencias","Similitud","Mutación","Clonación"], a:1},
{q:"Vestigial:", o:["Activo","Reducido","Mutado","Artificial"], a:1},
{q:"Embriología:", o:["Adulto","Desarrollo","ADN","Clima"], a:1},
{q:"Embrión similar:", o:["Mutación","Origen común","Clonación","Adaptación"], a:1},

{q:"Genética:", o:["Clima","ADN","Fósil","Órgano"], a:1},
{q:"Código genético:", o:["Variable","Universal","Artificial","Nulo"], a:1},
{q:"Biogeografía:", o:["ADN","Distribución","Mutación","Órgano"], a:1},
{q:"Aislamiento geográfico:", o:["Igual","Especiación","Clonación","Mutación"], a:1},
{q:"Evidencias apoyan:", o:["Mutación","Evolución","Clonación","Uso"], a:1},

{q:"Taxonomía:", o:["Clasifica","Mutación","ADN","Clima"], a:0},
{q:"Binomial:", o:["Uno","Dos","Tres","Ninguno"], a:1},
{q:"Criterio:", o:["Color","Tipo celular","Tamaño","Forma"], a:1},
{q:"Procariota:", o:["Núcleo","Sin núcleo","Tejido","Multi"], a:1},
{q:"Autótrofo:", o:["Consume","Produce","Nada","Mutación"], a:1},

{q:"Monera:", o:["Animal","Bacteria","Planta","Hongo"], a:1},
{q:"Protista:", o:["Procariota","Euc simple","Complejo","Animal"], a:1},
{q:"Fungi:", o:["Foto","Absorción","Procariota","Clonación"], a:1},
{q:"Plantae:", o:["Digestión","Fotosíntesis","Mutación","Clonación"], a:1},
{q:"Animalia:", o:["Auto","Hetero","Cloroplasto","Procariota"], a:1}
];

let actual = 0;
let respuestas = [];
let tiempo = 65;
let intervalo;

function iniciar(){
document.getElementById("inicio").classList.add("hidden");
document.getElementById("quiz").classList.remove("hidden");
mostrarPregunta();
}

function mostrarPregunta(){
if(actual>=preguntas.length){ terminar(); return; }

let p = preguntas[actual];
let html = "<div class='question'><h3>"+(actual+1)+". "+p.q+"</h3>";

p.o.forEach((op,i)=>{
html += `<label><input type="radio" name="r" value="${i}"> ${op}</label><br>`;
});

html += "<button type='button' onclick='siguiente()'>Siguiente</button></div>";

document.getElementById("formulario").innerHTML = html;

tiempo=65;
actualizarTimer();

clearInterval(intervalo);
intervalo = setInterval(()=>{
tiempo--;
actualizarTimer();
if(tiempo<=0) siguiente();
},1000);
}

function actualizarTimer(){
let m = Math.floor(tiempo/60);
let s = tiempo%60;
document.getElementById("timer").innerText =
(m<10?"0":"")+m+":"+(s<10?"0":"")+s;
}

function siguiente(){
let seleccion = document.querySelector('input[name="r"]:checked');
respuestas.push(seleccion ? parseInt(seleccion.value) : -1);
actual++;
mostrarPregunta();
}

function terminar(){
clearInterval(intervalo);
document.getElementById("quiz").classList.add("hidden");
document.getElementById("resultado").classList.remove("hidden");

let correctas = 0;
preguntas.forEach((p,i)=>{
if(p.a === respuestas[i]) correctas++;
});

let cal = (correctas/preguntas.length)*10;
document.getElementById("calificacion").innerText =
"Calificación: "+cal.toFixed(2)+" / 10";
}

function descargarPDF(){
window.print();
}
</script>

</body>
</html>
